server:
  port: ${SERVER_PORT:8080}

spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_db_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

blog:
  upload-path: uploads
  domain: ${SITE_DOMAIN:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT — 生产环境务必通过环境变量 JWT_SECRET 覆盖
jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration: 86400000

# AI — 生产环境务必通过环境变量 AI_API_KEY 覆盖
ai:
  enabled: true
  api-key: ${AI_API_KEY:your_deepseek_api_key}
  base-url: https://api.deepseek.com/v1
  model: deepseek-chat
  embedding-model: local-tfidf
